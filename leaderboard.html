<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Leaderboard - Tic-Tac-Toe: Nexus Grid</title>
    <link rel="icon" type="image/png" href="favicon.png">
    <link
        href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700&family=Space+Grotesk:wght@400;600;700&family=Orbitron:wght@400;700;900&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <script src="js/config.js"></script>
    <script src="js/storage.js"></script>
    <script src="js/sound.js"></script>
    <script src="js/main.js"></script>
    <style>
        .leaderboard-container {
            max-width: 900px;
            margin: 0 auto;
            padding: 40px 20px;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 40px;
        }

        .stat-card {
            background: var(--secondary-color);
            padding: 25px;
            border-radius: 12px;
            box-shadow: var(--shadow);
            border-left: 4px solid var(--accent-color);
            text-align: center;
        }

        .stat-card h3 {
            color: var(--accent-color);
            margin-bottom: 10px;
            font-size: 1.1em;
        }

        .stat-card .big-number {
            font-size: 2.5em;
            font-weight: 900;
            color: var(--accent-color);
        }

        .scoreboard-table {
            width: 100%;
            background: var(--secondary-color);
            border-collapse: collapse;
            border-radius: 10px;
            overflow: hidden;
            box-shadow: var(--shadow);
            margin-bottom: 40px;
        }

        .scoreboard-table th {
            background: var(--primary-color);
            color: var(--secondary-color);
            padding: 15px;
            text-align: left;
            font-weight: 700;
        }

        .scoreboard-table td {
            padding: 15px;
            border-bottom: 1px solid var(--cell-border);
        }

        .scoreboard-table tr:last-child td {
            border-bottom: none;
        }

        .scoreboard-table tr:hover {
            background: var(--cell-bg);
        }

        .player-rank {
            font-size: 1.3em;
            font-weight: 700;
            color: var(--accent-color);
            min-width: 40px;
        }

        .history-list {
            background: var(--secondary-color);
            border-radius: 10px;
            overflow: hidden;
            box-shadow: var(--shadow);
        }

        .history-item {
            padding: 20px;
            border-bottom: 1px solid var(--cell-border);
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 20px;
        }

        .history-item:last-child {
            border-bottom: none;
        }

        .history-item:hover {
            background: var(--cell-bg);
        }

        .history-time {
            font-size: 0.85em;
            opacity: 0.7;
            min-width: 150px;
            text-align: right;
        }

        .history-result {
            flex: 1;
            font-weight: 600;
            color: var(--accent-color);
        }

        .empty-message {
            text-align: center;
            padding: 40px 20px;
            opacity: 0.7;
            font-size: 1.1em;
        }
    </style>
</head>

<body>
    <!-- Navigation -->
    <nav>
        <div class="nav-container">
            <a href="index.html" class="nav-logo">NEXUS GRID</a>
            <ul class="nav-links">
                <li><a href="index.html">Home</a></li>
                <li><a href="game.html">Play</a></li>
                <li><a href="rules.html">Rules</a></li>
                <li><a href="leaderboard.html" class="active">Stats</a></li>
                <li><a href="settings.html">Settings</a></li>
            </ul>
            <div class="nav-controls">
                <button id="soundToggle" title="Toggle Sound">🔊</button>
            </div>
        </div>
    </nav>

    <div class="leaderboard-container">
        <h1
            style="font-family: 'Orbitron', sans-serif; font-size: 2.5em; color: var(--accent-color); margin-bottom: 30px;">
            📊 Statistics & History</h1>

        <!-- Overall Stats -->
        <section>
            <h2 style="color: var(--accent-color); margin-bottom: 20px; font-size: 1.5em;">Overall Statistics</h2>
            <div class="stats-grid" id="overallStats">
                <div class="stat-card">
                    <h3>Total Games</h3>
                    <div class="big-number" id="totalGames">0</div>
                </div>
                <div class="stat-card">
                    <h3>Total Wins</h3>
                    <div class="big-number" id="totalWins">0</div>
                </div>
                <div class="stat-card">
                    <h3>Total Draws</h3>
                    <div class="big-number" id="totalDraws">0</div>
                </div>
            </div>
        </section>

        <!-- Scoreboard -->
        <section>
            <h2 style="color: var(--accent-color); margin-bottom: 20px; font-size: 1.5em;">Player Scoreboard</h2>
            <div id="scoreboardContent"></div>
        </section>

        <!-- Game History -->
        <section>
            <h2 style="color: var(--accent-color); margin-bottom: 20px; font-size: 1.5em;">Recent Games</h2>
            <div id="historyContent"></div>
        </section>

        <!-- Clear Data -->
        <section style="text-align: center; margin-top: 40px;">
            <button id="clearAllBtn" class="clear-btn" style="max-width: 200px;">Clear All Data</button>
        </section>
    </div>

    <!-- Footer -->
    <footer>
        <div class="footer-content">
            <div class="footer-title">TIC TAC TOE</div>
            <div class="footer-text">The ultimate modern take on a classic game</div>
            <div class="footer-links">
                <a href="index.html">Home</a>
                <a href="game.html">Play</a>
                <a href="rules.html">Rules</a>
                <a href="leaderboard.html">Stats</a>
                <a href="settings.html">Settings</a>
            </div>
        </div>
    </footer>

    <script>
        async function updateLeaderboard() {
            const savedData = await fetchStatsFromBackend();
            const scoreboard = savedData.scoreboard || {};
            const history = savedData.history || [];

            // Calculate overall stats
            let totalGames = history.length;
            let totalWins = 0;
            let totalDraws = 0;

            if (history.length > 0) {
                history.forEach(game => {
                    const res = (game.result || '').toLowerCase();
                    if (res.includes('draw')) {
                        totalDraws++;
                    } else {
                        totalWins++;
                    }
                });
            } else {
                let sumWins = 0;
                let sumLosses = 0;
                let sumDraws = 0;
                Object.values(scoreboard).forEach(stats => {
                    sumWins += stats.wins || 0;
                    sumLosses += stats.losses || 0;
                    sumDraws += stats.draws || 0;
                });
                totalDraws = Math.floor(sumDraws / 2);
                totalWins = Math.floor((sumWins + sumLosses) / 2);
                totalGames = totalWins + totalDraws;
            }

            // Update overall stats
            document.getElementById('totalGames').textContent = totalGames;
            document.getElementById('totalWins').textContent = totalWins;
            document.getElementById('totalDraws').textContent = totalDraws;

            // Update scoreboard
            const scoreboardDiv = document.getElementById('scoreboardContent');
            const playerNames = Object.keys(scoreboard).sort();

            if (playerNames.length === 0) {
                scoreboardDiv.innerHTML = '<div class="empty-message">No games played yet. Start a game to see your stats!</div>';
            } else {
                let html = `
                    <table class="scoreboard-table">
                        <thead>
                            <tr>
                                <th>Rank</th>
                                <th>Player</th>
                                <th>Wins</th>
                                <th>Losses</th>
                                <th>Draws</th>
                                <th>Win Rate</th>
                            </tr>
                        </thead>
                        <tbody>
                `;

                // Sort by wins
                const sortedPlayers = playerNames.map(name => ({
                    name,
                    stats: scoreboard[name]
                })).sort((a, b) => (b.stats.wins || 0) - (a.stats.wins || 0));

                sortedPlayers.forEach((player, index) => {
                    const stats = player.stats;
                    const totalGames = (stats.wins || 0) + (stats.losses || 0) + (stats.draws || 0);
                    const winRate = totalGames > 0 ? ((stats.wins || 0) / totalGames * 100).toFixed(1) : '0.0';

                    html += `
                        <tr>
                            <td><span class="player-rank">#${index + 1}</span></td>
                            <td>${player.name}</td>
                            <td>${stats.wins || 0}</td>
                            <td>${stats.losses || 0}</td>
                            <td>${stats.draws || 0}</td>
                            <td>${winRate}%</td>
                        </tr>
                    `;
                });

                html += `</tbody></table>`;
                scoreboardDiv.innerHTML = html;
            }

            // Update history
            const historyDiv = document.getElementById('historyContent');
            if (history.length === 0) {
                historyDiv.innerHTML = '<div class="empty-message">No game history yet. Play some games to see your history!</div>';
            } else {
                let historyHtml = '<div class="history-list">';
                history.slice().reverse().forEach(game => {
                    historyHtml += `
                        <div class="history-item">
                            <div class="history-result">${game.result} • ${game.player1} vs ${game.player2}</div>
                            <div style="font-size: 0.9em; opacity: 0.8;">${game.mode}</div>
                            <div class="history-time">${new Date(game.date).toLocaleDateString()} ${new Date(game.date).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' })}</div>
                        </div>
                    `;
                });
                historyHtml += '</div>';
                historyDiv.innerHTML = historyHtml;
            }
        }

        // Clear all data
        document.getElementById('clearAllBtn').addEventListener('click', async () => {
            if (confirm('Are you sure you want to clear all game data? This cannot be undone.')) {
                await clearBackendStats();
                await updateLeaderboard();
            }
        });

        // Initial load
        window.addEventListener('DOMContentLoaded', async () => {
            initializeApp();
            await updateLeaderboard();
        });
    </script>
</body>

</html>
